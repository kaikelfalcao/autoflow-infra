# Kong Ingress routes — define como o NLB público roteia para cada microsserviço.
# Cada path prefix vai para o Service ClusterIP do microsserviço (na namespace autoflow).
#
# Microsserviços que NÃO expõem HTTP (saga-orchestrator, notification-service não
# precisam de rota — eles só consomem RabbitMQ).
---
# /auth/* → identity-service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: identity-ingress
  namespace: autoflow
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port: { number: 3000 }
          - path: /health
            pathType: Exact
            backend:
              service:
                name: identity-service
                port: { number: 3000 }
---
# /orders, /customers, /vehicles → order-service
apiVersion: networking.k8s.io/v1
