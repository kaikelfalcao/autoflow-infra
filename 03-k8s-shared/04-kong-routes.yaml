  rules:
    - http:
        paths:
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port: { number: 3001 }
          - path: /customers
            pathType: Prefix
            backend:
              service:
                name: order-service
                port: { number: 3001 }
          - path: /vehicles
            pathType: Prefix
