# Secrets pré-configurados para ambiente local.
# Passwords intencionalmente simples (NÃO USAR EM PROD).
# Todas as URLs apontam para os Services dentro do namespace autoflow.
---
apiVersion: v1
kind: Secret
metadata:
  name: identity-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: development
  PORT: "3000"
  LOG_LEVEL: debug
  DATABASE_URL: "postgresql://identity_user:identity_pass@postgres.autoflow.svc.cluster.local:5432/identity"
  JWT_SECRET: "local-dev-secret-minimo-32-caracteres-aqui-ok"
  JWT_CUSTOMER_EXPIRES_IN: "1h"
  JWT_ADMIN_EXPIRES_IN: "8h"
  ORDER_SERVICE_URL: "http://order-service.autoflow.svc.cluster.local:3001"
  ORDER_SERVICE_TIMEOUT_MS: "2000"
  CORRELATION_ID_HEADER: x-correlation-id
  SEED_ADMIN_EMAIL: "admin@autoflow.com"
  SEED_ADMIN_PASSWORD: "Admin@123"
  SEED_ADMIN_NAME: "Administrador"
  NEW_RELIC_APP_NAME: autoflow-identity
  NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED}"
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: order-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: development
  APP_PORT: "3001"
  DATABASE_HOST: postgres.autoflow.svc.cluster.local
  DATABASE_PORT: "5432"
  DATABASE_USER: order_user
  DATABASE_PASSWORD: order_pass
  DATABASE_NAME: order
  RABBITMQ_URL: "amqp://admin:admin@rabbitmq.autoflow.svc.cluster.local:5672"
  ENABLE_PAYMENT_CONSUMER: "true"
  CUSTOMER_SERVICE_URL: ""
  NEW_RELIC_APP_NAME: autoflow-order
  NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED}"
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: saga-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: development
  APP_PORT: "3002"
  DATABASE_HOST: postgres.autoflow.svc.cluster.local
  DATABASE_PORT: "5432"
  DATABASE_USER: saga_user
  DATABASE_PASSWORD: saga_pass
  DATABASE_NAME: saga
  RABBITMQ_URL: "amqp://admin:admin@rabbitmq.autoflow.svc.cluster.local:5672"
  ORDER_SERVICE_URL: "http://order-service.autoflow.svc.cluster.local:3001"
  NEW_RELIC_APP_NAME: autoflow-saga
  NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED}"
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: catalog-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: development
  PORT: "3003"
  LOG_LEVEL: debug
  MONGODB_URI: "mongodb://catalog_admin:catalog_pass@mongodb-catalog.autoflow.svc.cluster.local:27017/catalog?authSource=admin"
  RABBITMQ_URL: "amqp://admin:admin@rabbitmq.autoflow.svc.cluster.local:5672"
  RABBITMQ_PREFETCH: "10"
  CORRELATION_ID_HEADER: x-correlation-id
  NEW_RELIC_APP_NAME: autoflow-catalog
  NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED}"
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: development
  PORT: "3004"
  DB_HOST: postgres.autoflow.svc.cluster.local
  DB_PORT: "5432"
  DB_USER: payment_user
  DB_PASS: payment_pass
  DB_NAME: payment
  RABBITMQ_URL: "amqp://admin:admin@rabbitmq.autoflow.svc.cluster.local:5672"
  MP_MOCK: "true"
  MP_ACCESS_TOKEN: ""
  MP_NOTIFICATION_URL: ""
  NEW_RELIC_APP_NAME: autoflow-payment
  NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED}"
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: development
  PORT: "3005"
  MONGO_URI: "mongodb://notification_admin:notification_pass@mongodb-notification.autoflow.svc.cluster.local:27017/notification?authSource=admin"
  RABBITMQ_URL: "amqp://admin:admin@rabbitmq.autoflow.svc.cluster.local:5672"
  NEW_RELIC_APP_NAME: autoflow-notification
  NEW_RELIC_ENABLED: "${NEW_RELIC_ENABLED}"
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-catalog-auth
  namespace: autoflow
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: catalog_admin
  MONGO_INITDB_ROOT_PASSWORD: catalog_pass
  MONGO_INITDB_DATABASE: catalog
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-notification-auth
  namespace: autoflow
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: notification_admin
  MONGO_INITDB_ROOT_PASSWORD: notification_pass
  MONGO_INITDB_DATABASE: notification
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-auth
  namespace: autoflow
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: admin
