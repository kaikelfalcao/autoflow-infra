# Expõe a UI de management do RabbitMQ no host:15672 via NodePort 30672
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-mgmt-nodeport
  namespace: autoflow
spec:
  type: NodePort
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 30672
      protocol: TCP
  selector:
    app: rabbitmq
